<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sd="http://www.thymeleaf.org/spring-data">
	<head th:replace="fragments/head :: head"></head>
	<body>
		<nav th:replace="fragments/menu :: menu(activeMenu)"></nav>
		<div th:replace="fragments/help :: help"></div>
		<div class="container-fluid px-3 px-md-4 my-2" id="sessionEpreuvePage">
			<div th:if="${error}" class="alert alert-danger fw-bold">
				Vous devez supprimer tous les lieux, inscrits
				et <span th:text="${#strings.toLowerCase(surveillantTerme + 's')}"></span>
				avant de supprimer la session elle-même.
			</div>
			<div th:if="${bilanCsv}" class="alert alert-primary alert-dismissible fade show fw-bold">
				<span th:text="${bilanCsv}"></span>
				<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
			</div>
			<div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
				<h3 class="mb-0">Sessions</h3>
	            <div th:replace="~{manager/sessionEpreuve/list_btn :: btns}"></div>
			</div>
			<!-- Filtres -->
			<div th:replace="~{manager/sessionEpreuve/list_search :: search}"></div>
			<div th:replace="~{manager/sessionEpreuve/list_table :: table}"></div>
			<nav class="mt-3" th:replace="fragments/pagination :: pagination"></nav>
		 </div>
		<footer th:replace="fragments/footer :: footer"></footer>
		<div th:replace="~{manager/sessionEpreuve/list_modals :: modals}"></div>
	</body>
</html>
