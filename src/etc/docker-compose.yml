services:

   openldap:
     image: osixia/openldap:latest
     environment:
       LDAP_DOMAIN: "example.org"
     command: --copy-service
     volumes:
       - ./docker/ldap-config:/container/service/slapd/assets/config/bootstrap/ldif/custom
       - ./docker/ldap-config/schema:/container/service/slapd/assets/config/bootstrap/schema/custom
     ports:
       - 127.0.0.1:389:389

   cas:
     build:
        context: .
        dockerfile_inline: |
          FROM ghcr.io/esupportail/apereo-cas-ldap:7.3.6
          RUN apt-get update && apt-get -y install curl
     volumes:
       - ./docker/cas-config:/etc/cas
       - ./docker/cas-config/tmp-cas:/tmp/cas
     ports:
         - 127.0.0.1:8081:8080
     healthcheck:
       test: [ "CMD-SHELL", "test -f /tmp/cas.healthcheck-passed || (curl -fs http://cas:8080/cas/login | grep -q username && touch /tmp/cas.healthcheck-passed)" ]
       interval: 5s
       timeout: 10s
       retries: 20
     depends_on:
       openldap:
         condition: service_started

   postgresql:
        image: postgres:15
        environment:
          POSTGRES_USER: emargement
          POSTGRES_PASSWORD: emargement
          POSTGRES_DB: emargement
          POSTGRES_LISTEN_ADDRESSES: '*'
        ports:
          - 127.0.0.1:5432:5432
        healthcheck:
          test: [ "CMD-SHELL", "pg_isready -U emargement -d emargement -h localhost" ]
          interval: 5s
          timeout: 10s
          retries: 30

   esup-emargement:
        image: maven:3.9.0-eclipse-temurin-17
        profiles:
          - with-esup-emargement
        command:
          - "sh"
          - "-c"
          - |
            cd /app &&
            cp -rf /src/* /app/ &&
            cp /src/src/etc/docker/esup-emargement/properties/emargement.properties ./src/main/resources/ &&
            sed -i '/<dependency>/{:a;N;/<\/dependency>/!ba;/com\.oracle/d}' pom.xml &&
            mvn clean spring-boot:run
        healthcheck:
          test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/login >/dev/null 2>&1 || curl -fs http://localhost:8080/login >/dev/null" ]
          interval: 5s
          timeout: 10s
          retries: 30
        ports:
          - 127.0.0.1:8080:8080
        network_mode: "host"
        volumes:
          - ../..:/src
          - /app
        depends_on:
          postgresql:
            condition: service_healthy
          cas:
            condition: service_healthy



   playwright:
        build:
            context: ./docker/playwright
        profiles:
          - playwright
        command: ["sh", "-lc", "xvfb-run -a npx playwright test --headed esup-emargement.spec.js"]
        shm_size: 1gb
        volumes:
          - ./docker/playwright/playwright-report:/work/playwright-report
        network_mode: "host"
        depends_on:
          cas:
            condition: service_healthy
          esup-emargement:
            condition: service_healthy
