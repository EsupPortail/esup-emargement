emargement.datasource.driver-class-name=org.postgresql.Driver
emargement.datasource.jdbc-url=jdbc\:postgresql\://postgresql\:5432/emargement
emargement.datasource.username=emargement
emargement.datasource.password=emargement
emargement.datasource.auto-commit=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.messages.encoding=ISO-8859-1
spring.messages.fallback-to-system-locale=false
spring.thymeleaf.mode=html
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.order_by.default_null_ordering=last
spring.task.scheduling.pool.size=20

spring.mvc.static-path-pattern=/resources/**
spring.web.resources.static-locations=classpath:/static
spring.web.resources.cache.cachecontrol.max-age=1d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

#fix bug json
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

#Cas
cas.url=http://localhost:8081/cas
cas.ticketValidatorUrl=http://cas:8080/cas
cas.service=http://localhost:8080
cas.key=CAS_PROVIDER_LOCALHOST_9000


#ldap
spring.ldap.urls=ldap://openldap
spring.ldap.username=cn=admin,dc=example,dc=org
spring.ldap.password=admin
spring.ldap.base=dc=example,dc=org
ldap.groups=ou=groups

#Superadmins --> filtre ldap
ldap.superAdminFilter=(memberOf=cn=admin,ou=groups,dc=example,dc=org)
# Filtre permettant la rťcupťration de l'utilisateur ldap en fonction de l'uid renvoyť par CAS
ldap.userFilter=(uid=%s)

#smtp
spring.mail.host=
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

#apogee
#emargement.datasource.apogee.jdbc-url=jdbc:oracle:thin:@apogee.example.org:1522/APOGEE
#emargement.datasource.apogee.username=
#emargement.datasource.apogee.password=
#emargement.datasource.apogee.driver-class-name=oracle.jdbc.OracleDriver

#batch
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=4
spring.jpa.properties.hibernate.order_inserts=true

emargement.wsrest.photo.prefixe = https://esup-sgc.example.org/wsrest/photo/
emargement.wsrest.photo.suffixe = /photo

#cron purge // Appelť tous les jours ŗ 10H
log.cron.purge = 0 0 10 * * *
log.all.retention = 90

app.url =  https://esup-emargement.example.org
app.nomDomaine = univ-ville-fr
app.noreply = no-reply-esup-emargement

emargement.esupnfctag.link.jar = https://esup-nfc-tag.example.org/nfc-index/download-jar
emargement.esupnfctag.link.exe = https://esup-sgc.example.org/esup-sgc-client-installer.zip

emargement.ade.home.url = https://ade.example.org
emargement.ade.api.url.encrypted =
emargement.ade.api.url = https://ade.example.org/jsp/webapi

# Authentification WebAPI ADE:
# Pour ADE Campus 2025.1 version d'octobre 2025 et suivantes positionner auth_type ŗ "basic"
# Pour les versions d'ADE Campus prťcťdentes (y compris 2025.1 du 1er semestre 2025) positionner auth_type ŗ tout autre valeur (ex: "query_string")
emargement.ade.api.auth_type = basic
emargement.ade.api.login = xxxxxxx
emargement.ade.api.password = xxxxxxxx

#Ne doit pas Ítre vide, '-' par dťfaut. Ex : emargement.ade.sync.cron = 0 56 15 * * *
emargement.ade.sync.cron =  -
emargement.ade.sync.range = 7

#Heure d'import des ťvŤnements ADE : ne doit pas Ítre vide, '-' par dťfaut. Ex : emargement.ade.sync.cron = 0 57 16 * * ?
emargement.ade.import.cron = 0 59 23 * * ?
#Durťe de l'import des ťvŤnements ADE en seconces, si vide : dťfaut 25200 (7h)
emargement.ade.import.duree = 25200

emargement.esupsignature.url = https://esup-signature.example.org
emargement.esupsignature.workflow.id = 1250

emargement.sessions.statut.update=0 0 7 * * ?
